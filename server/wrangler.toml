name = "sto"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/", "/admin/*", "/auth/*", "/captains/*", "/systems/*", "/encounters/*", "/health"]

[[durable_objects.bindings]]
name = "CAPTAIN"
class_name = "CaptainDurableObject"

[[durable_objects.bindings]]
name = "SYSTEM"
class_name = "SystemDurableObject"

[[durable_objects.bindings]]
name = "ENCOUNTER"
class_name = "EncounterDurableObject"

[[durable_objects.bindings]]
name = "WORLD"
class_name = "WorldDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CaptainDurableObject", "SystemDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["EncounterDurableObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["WorldDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "sto"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "migrations"
